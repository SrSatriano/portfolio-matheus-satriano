<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-label="Matheus Rodrigues Satriano  Back-end, HFT, IA">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a12"/>
      <stop offset="50%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <g opacity="0.15" stroke="#22d3ee" stroke-width="1">
    <path d="M0 320 L200 280 L400 300 L600 240 L800 260 L1000 200 L1200 220"/>
    <path d="M0 360 L300 340 L600 300 L900 320 L1200 280"/>
  </g>
  <text x="80" y="140" fill="#ffffff" font-family="Georgia, serif" font-size="52" font-weight="700">Matheus Rodrigues Satriano</text>
  <text x="80" y="190" fill="url(#accent)" font-family="system-ui, sans-serif" font-size="22" letter-spacing="4">BACK-END · HFT · IA · WEB3</text>
  <text x="80" y="240" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16">LHN Sovereign V90 · 30+ repositórios públicos · github.com/SrSatriano</text>
  <rect x="80" y="280" width="180" height="4" fill="url(#accent)" filter="url(#glow)" rx="2"/>
  <circle cx="1050" cy="120" r="80" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
  <circle cx="1050" cy="120" r="50" fill="none" stroke="#34d399" stroke-width="1" opacity="0.3"/>
</svg>
